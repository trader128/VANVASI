name: VANVASI
options:
  bundleIdPrefix: com.vanasi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "259R8YNA9M"

configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

targets:
  VANVASI:
    type: application
    platform: iOS
    sources:
      - path: VANVASI
        excludes:
          - Info.plist
      - path: Shared
    resources:
      - path: VANVASI/Resources
      - path: VANVASI/PrivacyInfo.xcprivacy
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vanasi.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      INFOPLIST_KEY_CFBundleDisplayName: VANVASI
      INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
      INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_BackgroundColor: LaunchBackground
      INFOPLIST_KEY_NSUserNotificationsUsageDescription: "VANVASI sends a notification when you tap Unlock on a blocked app so you can complete the intentional unlock flow."
      INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
      INFOPLIST_FILE: VANVASI/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_KEY_CFBundleURLTypes:
        - CFBundleURLName: com.vanasi.app
          CFBundleURLSchemes:
            - vanasi
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_ENTITLEMENTS: VANVASI/VANVASI.entitlements
    dependencies:
      - target: VANVASIMonitor
        embed: true
      - target: VANVASIShield
        embed: true
      - target: VANVASIShieldAction
        embed: true
      - target: VANVASIWidget
        embed: true

  VANVASIMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: VANVASIMonitor
        excludes:
          - Info.plist
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vanasi.app.monitor
      INFOPLIST_FILE: VANVASIMonitor/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: VANVASIMonitor/VANVASIMonitor.entitlements

  VANVASIShield:
    type: app-extension
    platform: iOS
    sources:
      - path: VANVASIShield
        excludes:
          - Info.plist
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vanasi.app.shield
      INFOPLIST_FILE: VANVASIShield/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: VANVASIShield/VANVASIShield.entitlements

  VANVASIShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: VANVASIShieldAction
        excludes:
          - Info.plist
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vanasi.app.shieldaction
      INFOPLIST_FILE: VANVASIShieldAction/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: VANVASIShieldAction/VANVASIShieldAction.entitlements

  VANVASIWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: VANVASIWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vanasi.app.widget
      INFOPLIST_FILE: VANVASIWidget/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: VANVASIWidget/VANVASIWidget.entitlements

schemes:
  VANVASI:
    build:
      targets:
        VANVASI: all
    run:
      config: Debug
